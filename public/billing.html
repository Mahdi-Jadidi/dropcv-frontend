<!doctype html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="robots" content="noindex,nofollow" />
    <title>صورتحساب و پرداخت — drop.cv</title>
    <link rel="icon" href="logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="design-system.css" />
    <link rel="stylesheet" href="app-shell.css" />
    <style>
      body {
        background: #f7faf9;
        color: #13251f;
      }
      .billing-shell {
        max-width: 980px;
        margin: auto;
        padding: 32px 20px 64px;
      }
      .billing-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 28px;
      }
      .billing-head a {
        color: #0f6e56;
        text-decoration: none;
        font-weight: 700;
      }
      .grid {
        display: grid;
        grid-template-columns: 1.15fr 0.85fr;
        gap: 20px;
      }
      .panel {
        background: #fff;
        border: 1px solid #dfe8e4;
        border-radius: 18px;
        padding: 24px;
        box-shadow: 0 10px 30px rgba(15, 110, 86, 0.06);
      }
      .plan-row {
        display: flex;
        gap: 12px;
        margin: 20px 0;
      }
      .plan {
        flex: 1;
        border: 2px solid #dfe8e4;
        border-radius: 14px;
        padding: 16px;
        cursor: pointer;
        background: #fff;
        text-align: right;
      }
      .plan[aria-pressed="true"] {
        border-color: #0f6e56;
        background: #eff8f5;
      }
      .plan[data-plan="Premium"] { display: none; }
      .price {
        display: block;
        font-size: 22px;
        font-weight: 800;
        margin-top: 8px;
      }
      .status {
        padding: 12px 14px;
        border-radius: 10px;
        background: #eff8f5;
        margin: 16px 0;
      }
      .status.error {
        background: #fff0f0;
        color: #8b1f1f;
      }
      .pay {
        width: 100%;
        border: 0;
        border-radius: 12px;
        padding: 14px;
        background: #0f6e56;
        color: #fff;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }
      .pay:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      .history {
        width: 100%;
        border-collapse: collapse;
        margin-top: 12px;
      }
      .history th,
      .history td {
        text-align: right;
        padding: 11px 8px;
        border-bottom: 1px solid #edf2f0;
        font-size: 14px;
      }
      .muted {
        color: #66776f;
      }
      .loading {
        min-height: 260px;
        display: grid;
        place-items: center;
      }
      .hidden {
        display: none !important;
      }
      @media (max-width: 760px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .billing-head {
          align-items: flex-start;
        }
        .plan-row {
          flex-direction: column;
        }
        .history {
          display: block;
          overflow-x: auto;
          white-space: nowrap;
        }
      }
    </style>
  </head>
  <body>
    <main class="billing-shell">
      <header class="billing-head">
        <div>
          <h1>صورتحساب و پرداخت</h1>
          <p class="muted">اشتراک سالانه و وضعیت انتشار سایت شما</p>
        </div>
        <a id="dashboard-link" href="dashboard.html">بازگشت به داشبورد</a>
      </header>
      <section id="loading" class="panel loading">
        در حال دریافت اطلاعات حساب…
      </section>
      <section id="content" class="grid hidden">
        <div class="panel">
          <h2>انتخاب پلن</h2>
          <p class="muted">
            پس از تأیید پرداخت در زرین‌پال، سایت شما فعال می‌شود.
          </p>
          <div class="plan-row" role="group" aria-label="انتخاب پلن">
            <button class="plan" data-plan="Standard" aria-pressed="false">
              <strong>drop.cv سالانه</strong><span class="price">۶۹۰٬۰۰۰ تومان</span
              ><span class="muted">برای یک سال</span>
            </button>
            <button class="plan" data-plan="Premium" aria-pressed="false">
              <strong>پریمیوم</strong><span class="price">۹۹۰٬۰۰۰ تومان</span
              ><span class="muted">برای یک سال</span>
            </button>
          </div>
          <div id="subscription-status" class="status"></div>
          <button id="pay-button" class="pay" disabled>
            پرداخت امن با زرین‌پال
          </button>
          <p id="message" class="muted" role="status" aria-live="polite"></p>
        </div>
        <aside class="panel">
          <h2>جزئیات حساب</h2>
          <dl>
            <dt class="muted">ایمیل</dt>
            <dd id="account-email">—</dd>
            <dt class="muted">پلن فعلی</dt>
            <dd id="account-plan">—</dd>
            <dt class="muted">وضعیت</dt>
            <dd id="account-state">—</dd>
            <dt class="muted">تاریخ پایان</dt>
            <dd id="account-expiry">—</dd>
          </dl>
        </aside>
      </section>
      <section id="history-panel" class="panel hidden" style="margin-top: 20px">
        <h2>سابقه پرداخت</h2>
        <div id="history-empty" class="muted">هنوز پرداختی ثبت نشده است.</div>
        <table id="history-table" class="history hidden">
          <thead>
            <tr>
              <th>تاریخ</th>
              <th>پلن</th>
              <th>مبلغ</th>
              <th>وضعیت</th>
              <th>کد پیگیری</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>
    </main>
    <script src="site-config.js"></script>
    <script src="dropcv-api.js"></script>
    <script>
      (function () {
        var selectedPlan = null,
          user = null,
          paymentsEnabled = false;
        function faNumber(value) {
          return new Intl.NumberFormat("fa-IR").format(Number(value || 0));
        }
        function faDate(value) {
          return value
            ? new Intl.DateTimeFormat("fa-IR", { dateStyle: "medium" }).format(
                new Date(value),
              )
            : "—";
        }
        function stateLabel(value) {
          return (
            {
              trial: "آزمایشی",
              active: "فعال",
              offline_grace: "متوقف پس از پایان آزمایش",
              expired: "منقضی",
              released: "آزاد شده",
              pending: "در انتظار",
              verified: "تأیید شده",
              failed: "ناموفق",
              cancelled: "لغو شده",
            }[value] ||
            value ||
            "—"
          );
        }
        function selectPlan(plan) {
          selectedPlan = plan;
          document.querySelectorAll("[data-plan]").forEach(function (el) {
            el.setAttribute("aria-pressed", String(el.dataset.plan === plan));
          });
          document.getElementById("pay-button").disabled = !paymentsEnabled;
        }
        async function init() {
          var me = await dropCVApi.getMe();
          if (!me.ok || !me.data || !me.data.user) {
            location.replace("login.html?next=billing.html");
            return;
          }
          user = me.data.user;
          var plansResponse = await dropCVApi.getPlans();
          paymentsEnabled = Boolean(
            plansResponse.ok &&
            plansResponse.data &&
            plansResponse.data.capabilities &&
            plansResponse.data.capabilities.payments
          );
          selectPlan("Standard");
          if (!paymentsEnabled) {
            var unavailable = document.getElementById("message");
            document.getElementById("pay-button").textContent =
              "درگاه پرداخت به‌زودی فعال می‌شود";
            unavailable.textContent = "درگاه پرداخت به‌زودی فعال می‌شود. حساب آزمایشی شما تا آن زمان قابل استفاده است.";
            unavailable.className = "status";
          }
      document.getElementById("dashboard-link").href = "dashboard.html";
          document.getElementById("account-email").textContent =
            user.email || "—";
          document.getElementById("account-plan").textContent = "سالانه";
          var sub = user.subscription || {};
          document.getElementById("account-state").textContent = stateLabel(
            sub.status,
          );
          document.getElementById("account-expiry").textContent = faDate(
            sub.expiresAt || sub.expires_at,
          );
          document.getElementById("subscription-status").textContent =
            sub.status === "trial"
              ? "از دوره آزمایشی سه‌روزه شما " +
                faNumber(sub.daysLeft) +
                " روز باقی مانده است."
              : "وضعیت اشتراک: " + stateLabel(sub.status);
          var history = await dropCVApi.getPaymentHistory();
          var rows =
            history.ok && history.data && Array.isArray(history.data.payments)
              ? history.data.payments
              : [];
          if (rows.length) {
            var tbody = document.querySelector("#history-table tbody");
            rows.forEach(function (p) {
              var tr = document.createElement("tr");
              [
                faDate(p.created_at),
                "سالانه",
                faNumber(p.amount) + " تومان",
                stateLabel(p.status),
                p.reference_id || "—",
              ].forEach(function (v) {
                var td = document.createElement("td");
                td.textContent = v;
                tr.appendChild(td);
              });
              tbody.appendChild(tr);
            });
            document.getElementById("history-empty").classList.add("hidden");
            document.getElementById("history-table").classList.remove("hidden");
          }
          document.getElementById("loading").classList.add("hidden");
          document.getElementById("content").classList.remove("hidden");
          document.getElementById("history-panel").classList.remove("hidden");
        }
        document.querySelectorAll("[data-plan]").forEach(function (el) {
          el.addEventListener("click", function () {
            selectPlan(el.dataset.plan);
          });
        });
        document
          .getElementById("pay-button")
          .addEventListener("click", async function () {
            var button = this,
              message = document.getElementById("message");
            button.disabled = true;
            message.textContent = "در حال اتصال به زرین‌پال…";
            var result = await dropCVApi.requestPayment(selectedPlan);
            if (result.ok && result.data && result.data.paymentUrl) {
              location.assign(result.data.paymentUrl);
              return;
            }
            message.textContent = result.error || "شروع پرداخت ممکن نشد.";
            message.className = "status error";
            button.disabled = !paymentsEnabled;
          });
        init();
      })();
    </script>
  </body>
</html>
