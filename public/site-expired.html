<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>This site is no longer available - drop.cv</title>
  <link rel="stylesheet" href="design-system.css">
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #0f0f0f;
      background: #fff;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header {
      position: sticky;
      top: 0;
      background: rgba(255,255,255,0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid #e5e7eb;
      z-index: 10;
    }
    nav, .footer-inner {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: inherit;
      text-decoration: none;
      font-weight: 600;
      font-size: 20px;
    }
    .nav-logo-icon {
      width: 40px;
      height: 40px;
      background: #0F6E56;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 700;
    }
    .nav-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .nav-link, .footer-link {
      color: #666;
      text-decoration: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
    }
    .nav-link:hover, .footer-link:hover { background: #f5f5f5; color: #0f0f0f; }
    main {
      flex: 1;
      display: grid;
      place-items: center;
      padding: 48px 24px 72px;
    }
    .panel {
      max-width: 640px;
      width: 100%;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: clamp(32px, 4vw, 48px);
      line-height: 1.08;
    }
    p {
      margin: 0;
      color: #666;
      font-size: 18px;
    }
    .actions {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 10px;
      background: #0F6E56;
      color: #fff;
      text-decoration: none;
      font-weight: 600;
    }
    .support-link {
      font-size: 13px;
      color: #666;
      text-decoration: none;
    }
    footer {
      border-top: 1px solid #e5e7eb;
      background: #fafafa;
    }
    .footer-inner {
      font-size: 14px;
      color: #666;
      flex-wrap: wrap;
    }
    @media (max-width: 640px) {
      nav, .footer-inner { padding: 14px 16px; }
      .nav-links { display: none; }
      p { font-size: 16px; }
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html" class="nav-logo">
        <div class="nav-logo-icon">d</div>
        drop.cv
      </a>
      <div class="nav-links">
        <a href="index.html#how-it-works" class="nav-link">How it works</a>
        <a href="index.html#pricing" class="nav-link">Pricing</a>
      </div>
      <a href="signup.html" class="nav-link" style="background:#0F6E56;color:#fff;">Start the 3-day trial</a>
    </nav>
  </header>

  <main>
    <div class="panel">
      <h1>This site is no longer available</h1>
      <p>The subscription for this site is not active. The owner can restore it from their dashboard.</p>
      <div class="actions">
        <a href="signup.html" class="btn-primary">Claim a new name →</a>
        <a href="mailto:support@drop.cv" class="support-link">Think this is a mistake? Contact support@drop.cv</a>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-inner">
      <span>drop.cv</span>
      <a href="index.html#pricing" class="footer-link" style="font-size:12px;color:#8c8c8c;">Pricing</a>
    </div>
  </footer>
</body>
</html>
